<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會議助理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }
    .container { width: 100%; max-width: 600px; }
    h1 { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #888; margin-bottom: 32px; }

    .steps {
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      gap: 0;
    }
    .step-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #aaa;
      font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .step-dot.active { background: #6c63ff; color: #fff; }
    .step-dot.done { background: #4caf50; color: #fff; }
    .step-line { flex: 1; height: 2px; background: #e0e0e0; }
    .step-line.done { background: #4caf50; }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    .card h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 6px; }
    .card p { font-size: 14px; color: #666; margin-bottom: 20px; }

    .btn {
      padding: 12px 24px;
      border: none; border-radius: 10px;
      font-size: 15px; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6c63ff; color: #fff; }
    .btn-primary:hover { background: #574fd6; }
    .btn-primary:disabled { background: #c5c2f5; cursor: not-allowed; }
    .btn-secondary { background: #f0f2f5; color: #555; }
    .btn-secondary:hover { background: #e0e2e8; }

    .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; }

    .step-panel { display: none; }
    .step-panel.active { display: block; }

    .record-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Recording indicator ── */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }
    .rec-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #c0392b;
      animation: pulse-dot 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    .rec-timer {
      font-family: var(--font-body);
      font-size: 13px;
      letter-spacing: 0.12em;
      color: #c0392b;
      min-width: 44px;
    }

    /* ── AI Analysis Banners ── */
    .banner {
      padding: 14px 18px;
      margin-bottom: 20px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .banner-warn {
      border: 1px solid rgba(192,57,43,0.4);
      background: rgba(192,57,43,0.06);
      color: #e67e6e;
    }
    .banner-success {
      border: 1px solid rgba(212,175,55,0.4);
      background: rgba(212,175,55,0.06);
      color: var(--gold);
    }

    /* ── Analysis Cards ── */
    .analysis-section-title {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: 0.7;
      margin: 24px 0 12px;
    }
    .analysis-card {
      background: rgba(212,175,55,0.03);
      border: 1px solid rgba(212,175,55,0.12);
      padding: 16px;
      margin-bottom: 10px;
    }
    .analysis-card-content {
      font-size: 13px;
      color: var(--cream);
      letter-spacing: 0.03em;
      line-height: 1.65;
      margin-bottom: 8px;
    }
    .analysis-card-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .priority-badge {
      padding: 2px 8px;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid;
    }
    .priority-high   { color: var(--gold);  border-color: rgba(212,175,55,0.5); }
    .priority-medium { color: var(--cream); border-color: rgba(242,240,228,0.3); }
    .priority-low    { color: var(--muted); border-color: rgba(136,136,136,0.3); }

    /* ── History Panel ── */
    .history-panel {
      margin-top: 36px;
      border-top: 1px solid var(--gold-dim);
      padding-top: 28px;
    }
    .history-panel-title {
      font-family: var(--font-display);
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .history-panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold-dim);
    }
    .history-item {
      background: rgba(212,175,55,0.02);
      border: 1px solid rgba(212,175,55,0.1);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .history-item-body { flex: 1; }
    .history-item-content {
      font-size: 13px;
      color: var(--cream);
      letter-spacing: 0.02em;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .history-item-meta {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn-resolve {
      padding: 6px 12px;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid rgba(136,136,136,0.3);
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .btn-resolve:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .history-empty {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      padding: 20px 0;
    }

    .segments-title {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.6;
      margin: 24px 0 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>會議助理</h1>
    <p class="subtitle">語音轉文字 · 標記決議與待辦 · 一鍵輸出摘要</p>

    <div class="steps">
      <div class="step-dot active" id="dot-1">1</div>
      <div class="step-line" id="line-1"></div>
      <div class="step-dot" id="dot-2">2</div>
      <div class="step-line" id="line-2"></div>
      <div class="step-dot" id="dot-3">3</div>
      <div class="step-line" id="line-3"></div>
      <div class="step-dot" id="dot-4">4</div>
    </div>

    <div class="step-panel active" id="panel-1">
      <div class="card">
        <h2>上傳或錄製音訊</h2>
        <p>選擇音檔（mp3、wav、m4a）或直接錄音</p>
        <div id="server-error" class="error-msg" style="display:none">
          ⚠️ 無法連線到本地伺服器，請先執行：<code>uvicorn server:app --reload</code>
        </div>
        <div style="margin-bottom:16px">
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:8px">上傳音檔</label>
          <input type="file" id="fileInput" accept=".mp3,.wav,.m4a,.ogg,.flac,.webm" style="font-size:14px;width:100%">
          <div id="file-error" class="error-msg" style="display:none"></div>
        </div>
        <div style="text-align:center;color:#bbb;margin:16px 0;font-size:13px">— 或 —</div>
        <div style="margin-bottom:24px">
          <label style="font-size:14px;font-weight:600;display:block;margin-bottom:8px">即時錄音</label>
          <div class="record-row">
            <button class="btn btn-secondary" id="recordBtn" onclick="toggleRecord()">● 開始錄音</button>
            <div class="rec-dot" id="recDot" style="display:none"></div>
            <span class="rec-timer" id="recTimer" style="display:none">00:00</span>
            <span id="recordStatus" aria-live="polite"></span>
          </div>
          <div id="record-error" class="error-msg" style="display:none"></div>
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="submitAudio()" disabled>送出轉錄</button>
      </div>
    </div>

    <div class="step-panel" id="panel-2">
      <div class="card">
        <h2>轉錄中...</h2>
        <p>正在使用本地 Whisper 模型處理音訊，請稍候</p>
        <div style="text-align:center;padding:24px 0">
          <div id="spinner" style="font-size:32px;margin-bottom:16px">⏳</div>
          <div id="progress-status" style="font-size:15px;color:#555">初始化中...</div>
          <div id="progress-error" class="error-msg" style="margin-top:12px;display:none"></div>
          <button class="btn btn-secondary" id="retryBtn" style="margin-top:16px;display:none" onclick="retryTranscription()">重試</button>
        </div>
      </div>
    </div>

    <!-- Step III: AI Analysis + Review -->
    <div class="step-panel" id="panel-3">
      <div class="card">
        <div class="card-title-row">
          <span class="card-step-num" aria-hidden="true">III</span>
          <h2>分析結果</h2>
        </div>
        <div class="card-divider" aria-hidden="true"></div>
        <p>AI 自動提取決議與待辦，可手動調整標記</p>

        <div id="ollama-warn" class="banner banner-warn" style="display:none">
          <span>⚠ Ollama 未運行，請先執行 <code>ollama serve</code></span>
          <button class="btn btn-secondary" style="font-size:11px;padding:8px 14px" onclick="reanalyze()">重新分析</button>
        </div>
        <div id="resolved-banner" class="banner banner-success" style="display:none"></div>

        <div id="decisions-section" style="display:none">
          <div class="analysis-section-title">決議事項</div>
          <div id="decisions-list"></div>
        </div>

        <div id="action-items-section" style="display:none">
          <div class="analysis-section-title">待辦事項</div>
          <div id="action-items-list"></div>
        </div>

        <div class="segments-title">逐字稿</div>
        <div id="segments-list" style="margin-bottom:28px"></div>
        <button class="btn btn-primary" onclick="goToStep(4); renderSummary()">產生摘要</button>
      </div>
    </div>

    <!-- Step IV: Summary -->
    <div class="step-panel" id="panel-4">
      <div class="card">
        <div class="card-title-row">
          <span class="card-step-num" aria-hidden="true">IV</span>
          <h2>會議摘要</h2>
        </div>
        <div class="card-divider" aria-hidden="true"></div>
        <p>整理完成，可一鍵複製全文</p>
        <div id="summary-output" aria-label="會議摘要內容"></div>
        <div class="btn-row">
          <button class="btn btn-primary" id="copyBtn" onclick="copySummary()">複製摘要</button>
          <button class="btn btn-secondary" onclick="startOver()">重新開始</button>
        </div>

        <div class="history-panel">
          <div class="history-panel-title">歷史待辦追蹤</div>
          <div id="history-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    let currentStep = 1;
    let jobId = null;
    let segments = [];
    let decisions = [];
    let actionItems = [];
    let resolvedItemIds = [];
    let ollamaAvailable = true;
    let currentMeetingId = null;
    const API = 'http://localhost:8000';

    // --- Step navigation ---
    function goToStep(n) {
      document.getElementById(`panel-${currentStep}`).classList.remove('active');
      document.getElementById(`dot-${currentStep}`).classList.remove('active');
      document.getElementById(`dot-${currentStep}`).classList.add('done');
      if (currentStep < 4) {
        document.getElementById(`line-${currentStep}`).classList.add('done');
      }
      currentStep = n;
      document.getElementById(`panel-${n}`).classList.add('active');
      document.getElementById(`dot-${n}`).classList.add('active');
      document.getElementById(`dot-${n}`).classList.remove('done');
    }

    // --- Step 1: Audio input ---
    let mediaRecorder = null;
    let recordedChunks = [];
    let recordedBlob = null;
    let selectedFile = null;

    document.addEventListener('DOMContentLoaded', () => {
      checkServer();
      document.getElementById('fileInput').addEventListener('change', (e) => {
        selectedFile = e.target.files[0] || null;
        recordedBlob = null;
        updateSubmitBtn();
      });
    });

    async function checkServer() {
      try {
        const res = await fetch(`${API}/health`);
        if (!res.ok) throw new Error();
      } catch {
        document.getElementById('server-error').style.display = 'block';
      }
    }

    function updateSubmitBtn() {
      const hasAudio = selectedFile || recordedBlob;
      document.getElementById('submitBtn').disabled = !hasAudio;
    }

    let recInterval = null;
    let recSeconds = 0;

    async function toggleRecord() {
      const btn = document.getElementById('recordBtn');
      const status = document.getElementById('recordStatus');
      const errEl = document.getElementById('record-error');
      const recDot = document.getElementById('recDot');
      const recTimer = document.getElementById('recTimer');
      errEl.style.display = 'none';

      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        btn.textContent = '● 開始錄音';
        btn.classList.remove('btn-recording');
        recDot.style.display = 'none';
        recTimer.style.display = 'none';
        clearInterval(recInterval);
        recInterval = null;
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = () => {
          recordedBlob = new Blob(recordedChunks, { type: 'audio/webm' });
          selectedFile = null;
          document.getElementById('fileInput').value = '';
          status.textContent = '錄音完成 ✓';
          stream.getTracks().forEach(t => t.stop());
          updateSubmitBtn();
        };
        mediaRecorder.start();
        btn.textContent = '■ 停止錄音';

        // Start visual feedback
        recSeconds = 0;
        recDot.style.display = 'inline-block';
        recTimer.style.display = 'inline-block';
        recTimer.textContent = '00:00';
        recInterval = setInterval(() => {
          recSeconds++;
          const m = String(Math.floor(recSeconds / 60)).padStart(2, '0');
          const s = String(recSeconds % 60).padStart(2, '0');
          recTimer.textContent = `${m}:${s}`;
        }, 1000);
      } catch {
        errEl.textContent = '無法存取麥克風，請確認瀏覽器已授予麥克風權限。';
        errEl.style.display = 'block';
      }
    }

    async function submitAudio() {
      const audio = selectedFile || recordedBlob;
      if (!audio) return;
      const formData = new FormData();
      const filename = selectedFile ? selectedFile.name : 'recording.webm';
      formData.append('file', audio, filename);
      try {
        const res = await fetch(`${API}/transcribe`, { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json();
          document.getElementById('file-error').textContent = err.detail;
          document.getElementById('file-error').style.display = 'block';
          return;
        }
        const data = await res.json();
        jobId = data.job_id;
        goToStep(2);
        startPolling();
      } catch {
        document.getElementById('server-error').style.display = 'block';
      }
    }

    // --- Step 2: Polling ---
    let pollTimer = null;

    function startPolling() {
      document.getElementById('progress-status').textContent = '轉錄中，請稍候...';
      pollTimer = setInterval(poll, 2000);
    }

    async function poll() {
      try {
        const res = await fetch(`${API}/status/${jobId}`);
        if (!res.ok) throw new Error('status error');
        const data = await res.json();
        if (data.status === 'done') {
          clearInterval(pollTimer);
          await loadResult();
        } else if (data.status === 'error') {
          clearInterval(pollTimer);
          showTranscribeError(data.error || '轉錄失敗');
        } else {
          const labels = { pending: '等待處理...', processing: '轉錄中，請稍候...' };
          document.getElementById('progress-status').textContent = labels[data.status] || '處理中...';
        }
      } catch {
        clearInterval(pollTimer);
        showTranscribeError('無法連線到伺服器');
      }
    }

    function showTranscribeError(msg) {
      document.getElementById('spinner').textContent = '❌';
      document.getElementById('progress-status').textContent = '發生錯誤';
      const errEl = document.getElementById('progress-error');
      errEl.textContent = msg;
      errEl.style.display = 'block';
      document.getElementById('retryBtn').style.display = 'inline-block';
    }

    function retryTranscription() {
      goToStep(1);
      document.getElementById('progress-error').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
      document.getElementById('spinner').textContent = '⏳';
    }

    async function loadResult() {
      const res = await fetch(`${API}/result/${jobId}`);
      if (!res.ok) {
        showTranscribeError('無法取得轉錄結果');
        return;
      }
      const data = await res.json();
      segments = data.segments;
      decisions = data.decisions || [];
      actionItems = data.action_items || [];
      resolvedItemIds = data.resolved_item_ids || [];
      ollamaAvailable = data.ollama_available !== false;
      currentMeetingId = data.meeting_id || null;
      goToStep(3);
      renderAnalysis();
      renderSegments();
    }

    // --- Step 3: Tag segments ---
    function renderSegments() {
      const list = document.getElementById('segments-list');
      list.innerHTML = '';
      segments.forEach(seg => {
        const div = document.createElement('div');
        div.style.cssText = 'display:flex;gap:10px;align-items:flex-start;background:#f8f8fb;border-radius:10px;padding:12px';
        div.innerHTML = `
          <span style="flex:1;font-size:14px;color:#333;line-height:1.6">${escapeHtml(seg.text)}</span>
          <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            <button onclick="setTag(${seg.id},'decision')" style="
              padding:3px 10px;border-radius:6px;border:1.5px solid #6c63ff;
              background:${seg.tag==='decision'?'#6c63ff':'#fff'};
              color:${seg.tag==='decision'?'#fff':'#6c63ff'};
              font-size:12px;cursor:pointer">決議</button>
            <button onclick="setTag(${seg.id},'action')" style="
              padding:3px 10px;border-radius:6px;border:1.5px solid #ff6584;
              background:${seg.tag==='action'?'#ff6584':'#fff'};
              color:${seg.tag==='action'?'#fff':'#ff6584'};
              font-size:12px;cursor:pointer">待辦</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function setTag(id, tag) {
      const seg = segments.find(s => s.id === id);
      if (!seg) return;
      seg.tag = seg.tag === tag ? null : tag;
      renderSegments();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderAnalysis() {
      document.getElementById('ollama-warn').style.display =
        ollamaAvailable ? 'none' : 'flex';

      const resolvedBanner = document.getElementById('resolved-banner');
      if (resolvedItemIds.length > 0) {
        resolvedBanner.textContent = `✓ ${resolvedItemIds.length} 項待辦已在本次會議中完成`;
        resolvedBanner.style.display = 'flex';
      } else {
        resolvedBanner.style.display = 'none';
      }

      const decisionsSection = document.getElementById('decisions-section');
      const decisionsList = document.getElementById('decisions-list');
      if (decisions.length > 0) {
        decisionsSection.style.display = 'block';
        decisionsList.innerHTML = decisions.map(d => `
          <div class="analysis-card">
            <div class="analysis-card-content">${escapeHtml(d.content)}</div>
            <div class="analysis-card-meta">
              ${d.rationale ? `<span>理由：${escapeHtml(d.rationale)}</span>` : ''}
              ${d.related_people && d.related_people.length > 0
                ? `<span>相關人員：${d.related_people.map(escapeHtml).join('、')}</span>`
                : ''}
            </div>
          </div>
        `).join('');
      } else {
        decisionsSection.style.display = 'none';
      }

      const actionItemsSection = document.getElementById('action-items-section');
      const actionItemsList = document.getElementById('action-items-list');
      if (actionItems.length > 0) {
        actionItemsSection.style.display = 'block';
        actionItemsList.innerHTML = actionItems.map(a => `
          <div class="analysis-card">
            <div class="analysis-card-content">${escapeHtml(a.content)}</div>
            <div class="analysis-card-meta">
              <span class="priority-badge priority-${escapeHtml(a.priority)}">${
                {'high':'高','medium':'中','low':'低'}[a.priority] || escapeHtml(a.priority)
              }</span>
              ${a.assignee ? `<span>負責人：${escapeHtml(a.assignee)}</span>` : ''}
              ${a.deadline ? `<span>截止：${escapeHtml(a.deadline)}</span>` : ''}
            </div>
          </div>
        `).join('');
      } else {
        actionItemsSection.style.display = 'none';
      }
    }

    async function reanalyze() {
      if (!jobId) return;
      const res = await fetch(`${API}/result/${jobId}`);
      if (!res.ok) return;
      const data = await res.json();
      decisions = data.decisions || [];
      actionItems = data.action_items || [];
      resolvedItemIds = data.resolved_item_ids || [];
      ollamaAvailable = data.ollama_available !== false;
      renderAnalysis();
      renderSegments();
    }

    // --- Step 4: Summary ---
    function renderSummary() {
      const taggedDecisions = segments.filter(s => s.tag === 'decision');
      const taggedActions   = segments.filter(s => s.tag === 'action');
      const allText = segments.map(s => s.text).join('\n');

      let output = '【會議記錄】\n' + allText + '\n';

      if (decisions.length > 0) {
        output += '\n【決議事項】\n';
        decisions.forEach((d, i) => {
          output += `${i + 1}. ${d.content}`;
          if (d.rationale) output += `（${d.rationale}）`;
          output += '\n';
        });
      } else if (taggedDecisions.length > 0) {
        output += '\n【決議事項】\n';
        taggedDecisions.forEach((s, i) => { output += `${i + 1}. ${s.text}\n`; });
      }

      if (actionItems.length > 0) {
        output += '\n【待辦事項】\n';
        actionItems.forEach((a, i) => {
          output += `${i + 1}. ${a.content}`;
          if (a.assignee) output += `（負責人：${a.assignee}）`;
          if (a.deadline) output += `（截止：${a.deadline}）`;
          output += '\n';
        });
      } else if (taggedActions.length > 0) {
        output += '\n【待辦事項】\n';
        taggedActions.forEach((s, i) => { output += `${i + 1}. ${s.text}\n`; });
      }

      document.getElementById('summary-output').textContent = output;
      loadHistoryPanel();
    }

    async function loadHistoryPanel() {
      const list = document.getElementById('history-list');
      list.innerHTML = '<div class="history-empty">載入中...</div>';
      try {
        const res = await fetch(`${API}/action-items/pending`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const items = data.items || [];
        if (items.length === 0) {
          list.innerHTML = '<div class="history-empty">目前無待處理事項</div>';
          return;
        }
        list.innerHTML = items.map(item => `
          <div class="history-item" id="history-item-${escapeHtml(item.meeting_id)}-${escapeHtml(item.id)}">
            <div class="history-item-body">
              <div class="history-item-content">${escapeHtml(item.content)}</div>
              <div class="history-item-meta">
                <span class="priority-badge priority-${escapeHtml(item.priority)}">${
                  {'high':'高','medium':'中','low':'低'}[item.priority] || escapeHtml(item.priority)
                }</span>
                ${item.assignee ? `<span>負責人：${escapeHtml(item.assignee)}</span>` : ''}
                ${item.deadline ? `<span>截止：${escapeHtml(item.deadline)}</span>` : ''}
                <span>來源：${escapeHtml(item.meeting_date || item.meeting_id)}</span>
              </div>
            </div>
            <button class="btn-resolve"
              data-meeting-id="${escapeHtml(item.meeting_id)}"
              data-item-id="${escapeHtml(item.id)}"
              onclick="resolveHistoryItem(this.dataset.meetingId, this.dataset.itemId, this)">
              標記完成
            </button>
          </div>
        `).join('');
      } catch {
        list.innerHTML = '<div class="history-empty">無法載入歷史待辦</div>';
      }
    }

    async function resolveHistoryItem(meetingId, itemId, btn) {
      btn.disabled = true;
      btn.textContent = '處理中...';
      try {
        const res = await fetch(`${API}/action-items/${meetingId}/${itemId}/resolve`, {
          method: 'POST',
        });
        if (res.ok) {
          const row = document.getElementById(`history-item-${meetingId}-${itemId}`);
          if (row) {
            row.style.opacity = '0.4';
            row.style.transition = 'opacity 0.4s';
            btn.textContent = '已完成 ✓';
            setTimeout(() => row.remove(), 1200);
          }
        } else {
          btn.textContent = '失敗';
          setTimeout(() => { btn.textContent = '標記完成'; btn.disabled = false; }, 2000);
        }
      } catch {
        btn.textContent = '失敗';
        setTimeout(() => { btn.textContent = '標記完成'; btn.disabled = false; }, 2000);
      }
    }

    async function copySummary() {
      const text = document.getElementById('summary-output').textContent;
      const btn = document.getElementById('copyBtn');
      try {
        await navigator.clipboard.writeText(text);
        btn.textContent = '已複製 ✓';
        setTimeout(() => { btn.textContent = '複製摘要'; }, 2000);
      } catch {
        btn.textContent = '複製失敗，請手動選取';
        setTimeout(() => { btn.textContent = '複製摘要'; }, 3000);
      }
    }

    function startOver() {
      jobId = null;
      segments = [];
      decisions = [];
      actionItems = [];
      resolvedItemIds = [];
      ollamaAvailable = true;
      currentMeetingId = null;
      document.getElementById('ollama-warn').style.display = 'none';
      document.getElementById('resolved-banner').style.display = 'none';
      document.getElementById('decisions-section').style.display = 'none';
      document.getElementById('action-items-section').style.display = 'none';
      selectedFile = null;
      recordedBlob = null;
      document.getElementById('fileInput').value = '';
      document.getElementById('recordStatus').textContent = '';
      document.getElementById('recDot').style.display = 'none';
      document.getElementById('recTimer').style.display = 'none';
      if (recInterval) { clearInterval(recInterval); recInterval = null; }
      recSeconds = 0;
      document.getElementById('submitBtn').disabled = true;

      for (let i = 1; i <= 4; i++) {
        document.getElementById(`dot-${i}`).classList.remove('active', 'done');
        if (i < 4) document.getElementById(`line-${i}`).classList.remove('done');
        document.getElementById(`panel-${i}`).classList.remove('active');
      }
      document.getElementById('dot-1').classList.add('active');
      document.getElementById('panel-1').classList.add('active');
      currentStep = 1;
      document.getElementById('spinner').textContent = '⏳';
      document.getElementById('progress-status').textContent = '初始化中...';
      document.getElementById('progress-error').style.display = 'none';
      document.getElementById('retryBtn').style.display = 'none';
    }
  </script>
</body>
</html>
